name: Build check

# On pull requests to main, verify that `bun run build` succeeds in a clean
# environment. Catches build errors (Tailwind config, broken Markdown,
# articles.json out of sync with .md files) before merge — the actual deploy
# happens in the deploy workflow on push to main.

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full build
        run: bun run build
