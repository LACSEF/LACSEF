<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Photo Gallery - LA Science Fair</title>
    <meta
      name="description"
      content="Photos from past LA County Science &amp; Engineering Fairs. Browse memories from student competitions, award ceremonies, and fair days at Shrine Expo Hall." />
    <link rel="canonical" href="https://www.lascifair.org/gallery.html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LA Science Fair" />
    <meta property="og:title" content="Photo Gallery - LA Science Fair" />
    <meta
      property="og:description"
      content="Photos from past LA County Science &amp; Engineering Fairs." />
    <meta property="og:url" content="https://www.lascifair.org/gallery.html" />
    <meta property="og:image" content="https://www.lascifair.org/images/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="LA Science Fair — Los Angeles County Science &amp; Engineering Fair, est. 1950" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Photo Gallery - LA Science Fair" />
    <meta
      name="twitter:description"
      content="Photos from past LA County Science &amp; Engineering Fairs." />
    <meta name="twitter:image" content="https://www.lascifair.org/images/og-card.png" />
    <meta
      name="twitter:image:alt"
      content="LA Science Fair — Los Angeles County Science &amp; Engineering Fair, est. 1950" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Public+Sans:wght@600;700&display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/components.js"></script>
    <script src="js/gallery.js"></script>
  </head>

  <body class="antialiased text-on-surface bg-background min-h-screen flex flex-col">
    <div id="site-header"></div>

    <main class="flex-grow">
      <!-- Page Hero -->
      <section class="bg-surface border-b border-outline-variant py-stack-xl">
        <div class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop">
          <h1 class="font-headline-xl text-headline-xl text-primary mb-stack-sm">Photo Gallery</h1>
          <p class="font-body-lg text-body-lg text-on-surface-variant max-w-3xl">
            Memories from LA County Science &amp; Engineering Fairs past &mdash; students, projects,
            and award moments spanning decades of scientific discovery.
          </p>
        </div>
      </section>

      <div class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-stack-xl">
        <!-- Year filters -->
        <div id="gallery-filters" class="flex flex-wrap gap-2 mb-stack-lg"></div>

        <!-- Photo grid -->
        <div
          id="gallery-grid"
          class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-gutter"></div>

        <!-- Pagination -->
        <div id="gallery-pagination"></div>
      </div>
    </main>

    <!-- Lightbox -->
    <div
      id="gallery-lightbox"
      class="hidden fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4"
      role="dialog"
      aria-modal="true"
      aria-label="Photo lightbox">
      <button
        id="lb-close"
        type="button"
        aria-label="Close"
        class="absolute top-4 right-4 w-11 h-11 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors">
        <span class="material-symbols-outlined text-white text-[22px]">close</span>
      </button>
      <button
        id="lb-prev"
        type="button"
        aria-label="Previous photo"
        class="absolute left-4 top-1/2 -translate-y-1/2 w-11 h-11 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
        <span class="material-symbols-outlined text-white text-[22px]">arrow_back</span>
      </button>
      <button
        id="lb-next"
        type="button"
        aria-label="Next photo"
        class="absolute right-4 top-1/2 -translate-y-1/2 w-11 h-11 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
        <span class="material-symbols-outlined text-white text-[22px]">arrow_forward</span>
      </button>
      <div class="flex flex-col items-center gap-stack-md max-w-4xl w-full">
        <img
          id="lb-img"
          alt=""
          class="max-h-[75vh] max-w-full rounded-lg object-contain transition-opacity duration-150" />
        <div class="flex items-center justify-between w-full px-2">
          <span id="lb-caption" class="font-body-md text-body-md text-white/80"></span>
          <span id="lb-counter" class="font-label-md text-label-md text-white/50 shrink-0"></span>
        </div>
      </div>
    </div>

    <div id="site-footer"></div>
  </body>
</html>
